<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Arts — Faculty &amp; Areas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg:        #ffffff;
    --bg2:       #f5f4f0;
    --text:      #1a1a18;
    --text2:     #6b6a64;
    --text3:     #9c9a92;
    --border:    rgba(0,0,0,0.12);
    --tenure:    #534AB7;
    --tenure-bg: #EEEDFE;
    --teach:     #0F6E56;
    --teach-bg:  #E1F5EE;
  }
 
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #1c1c1a;
      --bg2:       #252523;
      --text:      #e8e6de;
      --text2:     #9c9a92;
      --text3:     #6b6a64;
      --border:    rgba(255,255,255,0.1);
      --tenure:    #9B94E8;
      --tenure-bg: #2a2845;
      --teach:     #3ecba0;
      --teach-bg:  #0e2d24;
    }
  }
 
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
 
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    min-height: 100%;
  }
 
  header {
    text-align: center;
    margin-bottom: 1.5rem;
    max-width: 560px;
  }
 
  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: .01em;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
 
  header p {
    font-size: 0.8rem;
    color: var(--text2);
    line-height: 1.5;
  }
 
  .legend {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    font-size: 0.75rem;
    color: var(--text2);
  }
 
  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
  }
 
  .leg-swatch {
    width: 13px;
    height: 13px;
    border-radius: 2px;
    border: 1.5px solid #888;
    flex-shrink: 0;
  }
 
  .leg-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
  }
 
  .main-wrap {
    display: flex;
    gap: 1rem;
    width: 100%;
    max-width: 820px;
    align-items: flex-start;
  }
 
  #canvas-wrap {
    flex: 1;
    min-width: 0;
    position: relative;
  }
 
  canvas {
    width: 100%;
    display: block;
    cursor: default;
  }
 
  #room-panel {
    width: 130px;
    flex-shrink: 0;
    padding-top: 4px;
  }
 
  .room-label {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: .5rem;
  }
 
  .room-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
    margin-bottom: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .12s, background .12s;
  }
 
  .room-btn:hover { background: var(--bg2); }
 
  .room-btn.active {
    border-color: currentColor;
    background: var(--bg2);
  }
 
  .room-num {
    font-size: .78rem;
    font-weight: 600;
    color: var(--text);
    display: block;
  }
 
  .room-name {
    font-size: .65rem;
    color: var(--text2);
    display: block;
    margin-top: 1px;
    line-height: 1.3;
  }
 
  #area-dialog {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--border);
    z-index: 10;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
  }
 
  #info {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text2);
    min-height: 1.4rem;
    margin-top: 0.6rem;
    padding: 0 1rem;
  }
 
  #info strong {
    color: var(--text);
    font-weight: 600;
  }
 
  footer {
    margin-top: 2.5rem;
    font-size: 0.72rem;
    color: var(--text3);
    text-align: center;
  }
 
  footer a {
    color: var(--text3);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
</style>
</head>
<body>
 
<header>
  <h1>Department of Studio Arts — University of Pittsburgh</h1>
  <p>Faculty connections across teaching areas. Click any name or area to highlight.</p>
</header>
 
<div class="legend">
  <div class="leg">
    <div class="leg-swatch" style="background:#F1EFE8;border-color:#5F5E5A"></div>
    Teaching area
  </div>
  <div class="leg">
    <div class="leg-dot" style="background:var(--tenure)"></div>
    Tenure-line
  </div>
  <div class="leg">
    <div class="leg-dot" style="background:var(--teach)"></div>
    Teaching track
  </div>
  <div class="leg">
    <div class="leg-dot" style="background:var(--tenure);opacity:.5;outline:2px dashed var(--tenure);outline-offset:1px;border-radius:50%"></div>
    Retiring Spring 2027
  </div>
</div>
 
<div class="main-wrap">
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
    <div id="area-dialog">
      <div style="text-align:center;padding:0 12px">
        <div style="display:flex;justify-content:center;gap:16px;align-items:flex-end">
          <div>
            <div id="dialog-fac-count" style="font-size:1.7rem;font-weight:600;line-height:1"></div>
            <div style="font-size:.65rem;color:var(--text2);margin-top:3px">faculty</div>
          </div>
          <div style="font-size:.9rem;color:var(--text3);padding-bottom:6px">/</div>
          <div>
            <div id="dialog-courses" style="font-size:1.7rem;font-weight:600;line-height:1"></div>
            <div style="font-size:.65rem;color:var(--text2);margin-top:3px">sections</div>
          </div>
        </div>
      </div>
    </div>
  </div>
 
  <div id="room-panel">
    <div class="room-label">Rooms</div>
  </div>
</div>
 
<div id="info">Click a name or area to highlight connections</div>
 
<div style="margin-top:1rem">
  <button id="retire-btn" onclick="toggleRetiring()" style="font-size:.75rem;padding:5px 14px;border-radius:20px;border:1px solid rgba(0,0,0,0.15);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit">
    Hide retiring faculty
  </button>
</div>
 
<footer>
  <a href="https://www.studioarts.pitt.edu" target="_blank">studioarts.pitt.edu</a>
</footer>
 
<script>
const DPR = window.devicePixelRatio || 1;
 
const AREAS = [
  { id:'vt',          label:'Visual Thinking', angle:  0, color:'#5F5E5A', fill:'#F1EFE8', textColor:'#3a3a38' },
  { id:'digital',     label:'Digital|Time-based',        angle: 40, color:'#534AB7', fill:'#EEEDFE', textColor:'#3C3489' },
  { id:'photo',       label:'Photography',    angle: 80, color:'#185FA5', fill:'#E6F1FB', textColor:'#0C447C' },
  { id:'practical',   label:'Practical',      angle:120, color:'#1D9E75', fill:'#E1F5EE', textColor:'#085041' },
  { id:'sculpture',   label:'Sculpture|Fiber',      angle:160, color:'#854F0B', fill:'#FAEEDA', textColor:'#633806' },
  { id:'printmaking', label:'Printmaking',    angle:200, color:'#993556', fill:'#FBEAF0', textColor:'#72243E' },
  { id:'drawing',     label:'Drawing',        angle:240, color:'#3B6D11', fill:'#EAF3DE', textColor:'#27500A' },
  { id:'painting',    label:'Painting',       angle:280, color:'#D85A30', fill:'#FAECE7', textColor:'#993C1D' },
  { id:'support',     label:'Support',        angle:320, color:'#888780', fill:'#F1EFE8', textColor:'#444441' },
];
 
const ALL_FACULTY = [
  { id:'henderson',   name:'Henderson',   rank:'tenure',   areas:['digital','photo','vt','practical'] },
  { id:'batista',     name:'Batista',     rank:'tenure',   areas:['drawing'],                          retiring:true },
  { id:'catanese',    name:'Catanese',    rank:'teaching', areas:['photo','practical','drawing'] },
  { id:'jenkins',     name:'Jenkins',     rank:'tenure',   areas:['sculpture','practical'],             retiring:true },
  { id:'mobley',      name:'Mobley',      rank:'tenure',   areas:['digital'] },
  { id:'shekari',     name:'Shekari',     rank:'tenure',   areas:['painting','drawing','practical'] },
  { id:'morrissey',   name:'Morrissey',   rank:'teaching', areas:['printmaking','drawing','vt','practical'] },
  { id:'turri',       name:'Turri',       rank:'teaching', areas:['painting','drawing','practical'] },
  { id:'piscitelli',  name:'Piscitelli',  rank:'teaching', areas:['sculpture','drawing','vt'] },
  { id:'andrew',      name:'Andrew',      rank:'teaching', areas:['digital','vt'] },
  { id:'bullock',     name:'Bullock',     rank:'teaching', areas:['sculpture'] },
  { id:'perez',       name:'Perez',       rank:'teaching', areas:['sculpture','vt'] },
  { id:'taoka',       name:'Taoka',       rank:'teaching', areas:['support'] },
  { id:'lemon',       name:'Lemon',       rank:'teaching', areas:['painting','drawing'] },
];
 
let showRetiring = true;
let FACULTY = ALL_FACULTY;
 
const areaMap = {};
AREAS.forEach(a => areaMap[a.id] = a);
 
const AREA_DATA = {
  vt:          { courses: 6 },
  digital:     { courses: 4 },
  photo:       { courses: 4 },
  practical:   { courses: 1 },
  sculpture:   { courses: 5 },
  printmaking: { courses: 1 },
  drawing:     { courses: 6 },
  painting:    { courses: 6 },
  support:     { courses: null },
};
 
const ROOMS = [
  { id:'b5',  num:'B5',  name:'Wood Shop',            areas:['sculpture','support'] },
  { id:'b6',  num:'B6',  name:'Sculpture Studio',     areas:['sculpture'] },
  { id:'b7',  num:'B7',  name:'Digital Fab Studio',   areas:['digital','sculpture','support'] },
  { id:'b15', num:'B15', name:'Drawing Studio',       areas:['drawing'] },
  { id:'b23', num:'B23', name:'Print Annex',          areas:['digital','photo'] },
  { id:'b34', num:'B34', name:'Painting Studio',      areas:['painting'] },
  { id:'b40', num:'B40', name:'Etching Studio',       areas:['printmaking'] },
  { id:'b41', num:'B41', name:'Screen Print Studio',  areas:['printmaking'] },
  { id:'b42', num:'B42', name:'Visual Thinking Studio', areas:['vt','practical'] },
  { id:'b43', num:'B43', name:'Digital Studio',         areas:['photo','digital'] },
];
 
const DEG = Math.PI / 180;
const cv  = document.getElementById('cv');
let W, H, CX, CY, SPOKE_R, FAC_R, AW, AH;
 
function isDark() {
  return window.matchMedia('(prefers-color-scheme:dark)').matches;
}
 
function rankColor(rank) {
  return isDark()
    ? (rank === 'tenure' ? '#9B94E8' : '#3ecba0')
    : (rank === 'tenure' ? '#534AB7' : '#0F6E56');
}
 
function rankFill(rank) {
  return isDark()
    ? (rank === 'tenure' ? '#2a2845' : '#0e2d24')
    : (rank === 'tenure' ? '#EEEDFE' : '#E1F5EE');
}
 
function areaFill(a) {
  if (!isDark()) return a.fill;
  return a.fill.replace(/^#/, '').match(/.{2}/g)
    .map(c => Math.round(parseInt(c,16) * 0.25 + 20).toString(16).padStart(2,'0'))
    .reduce((s,c) => s+c, '#');
}
 
function areaTextColor(a) {
  return isDark() ? a.color : a.textColor;
}
 
function layout() {
  const rect = document.getElementById('canvas-wrap').getBoundingClientRect();
  W = rect.width;
  H = W;
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  cv.width  = W * DPR;
  cv.height = H * DPR;
 
  CX = W / 2; CY = H / 2;
  SPOKE_R = W * 0.285;
  FAC_R   = W * 0.054;
  AW      = W * 0.155;
  AH      = W * 0.078;
 
  AREAS.forEach(a => {
    const ang = a.angle * DEG;
    a.x = CX + Math.cos(ang) * SPOKE_R;
    a.y = CY + Math.sin(ang) * SPOKE_R;
  });
 
  const FAC_RING = W * 0.445;
 
  const target = {};
  FACULTY.forEach(f => {
    const angles = f.areas.map(id => areaMap[id].angle);
    if (angles.length === 1) {
      target[f.id] = angles[0];
    } else {
      let sinSum = 0, cosSum = 0;
      angles.forEach(a => { sinSum += Math.sin(a * DEG); cosSum += Math.cos(a * DEG); });
      target[f.id] = (Math.atan2(sinSum, cosSum) / DEG + 360) % 360;
    }
  });
 
  const assigned = {};
  FACULTY.forEach(f => { assigned[f.id] = target[f.id]; });
 
  const minSep = (FAC_R * 2.8 / FAC_RING) / DEG;
 
  for (let iter = 0; iter < 400; iter++) {
    FACULTY.forEach((f, i) => {
      let push = 0;
      FACULTY.forEach((g, j) => {
        if (i === j) return;
        let da = assigned[f.id] - assigned[g.id];
        while (da >  180) da -= 360;
        while (da < -180) da += 360;
        if (Math.abs(da) < minSep)
          push += (da <= 0 ? -1 : 1) * (minSep - Math.abs(da)) * 0.4;
      });
      let gravity = target[f.id] - assigned[f.id];
      while (gravity >  180) gravity -= 360;
      while (gravity < -180) gravity += 360;
      assigned[f.id] = (assigned[f.id] + push + gravity * 0.04 + 360) % 360;
    });
  }
 
  FACULTY.forEach(f => {
    const ang = assigned[f.id] * DEG;
    f.x = CX + Math.cos(ang) * FAC_RING;
    f.y = CY + Math.sin(ang) * FAC_RING;
  });
}
 
let selected = null, hovering = null, selectedRoom = null;
 
function getHL(sel) {
  if (!sel) return { areas: new Set(), facs: new Set() };
  const areas = new Set(), facs = new Set();
  if (sel.type === 'room') {
    sel.node.areas.forEach(id => areas.add(id));
    FACULTY.forEach(f => { if (f.areas.some(id => areas.has(id))) facs.add(f.id); });
  } else if (sel.type === 'fac') {
    facs.add(sel.id);
    sel.node.areas.forEach(id => areas.add(id));
  } else {
    areas.add(sel.id);
    FACULTY.forEach(f => { if (f.areas.includes(sel.id)) facs.add(f.id); });
  }
  return { areas, facs };
}
 
function renderRooms() {
  const panel = document.getElementById('room-panel');
  panel.innerHTML = '<div class="room-label">Rooms</div>';
  const { areas: hlAreas } = getHL(selected);
 
  ROOMS.forEach(r => {
    const isActive = selectedRoom === r.id;
    const isHL = !isActive && selected && r.areas.some(id => hlAreas.has(id));
    const btn = document.createElement('button');
    btn.className = 'room-btn' + (isActive ? ' active' : '');
    const firstColor = areaMap[r.areas[0]]?.color || '#888';
    if (isHL) {
      btn.style.borderColor = firstColor;
      btn.style.background = areaMap[r.areas[0]]?.fill || 'var(--bg2)';
    }
    btn.innerHTML = `<span class="room-num">${r.num}</span><span class="room-name">${r.name}</span>`;
    btn.addEventListener('click', () => {
      if (selectedRoom === r.id) {
        selectedRoom = null;
        selected = null;
        closeDialog();
        document.getElementById('info').textContent = 'Click a name or area to highlight connections';
      } else {
        selectedRoom = r.id;
        selected = { type: 'room', id: r.id, node: r };
        const roomAreas = r.areas.map(id => areaMap[id].label.replace('|','/')).join(', ');
        document.getElementById('info').innerHTML = `<strong>${r.num} ${r.name}</strong> &nbsp;·&nbsp; ${roomAreas}`;
        showRoomDialog(r);
      }
      renderRooms();
      draw();
    });
    panel.appendChild(btn);
  });
}
 
function showRoomDialog(room) {
  const hlAreas = new Set(room.areas);
  const facs = FACULTY.filter(f => f.areas.some(id => hlAreas.has(id)));
  const totalCourses = room.areas.reduce((s, id) => {
    const d = AREA_DATA[id];
    return s + (d && d.courses ? d.courses : 0);
  }, 0);
  const el = document.getElementById('area-dialog');
  const firstAreaColor = areaMap[room.areas[0]]?.color || '#888';
  el.style.borderColor = firstAreaColor;
  document.getElementById('dialog-fac-count').textContent = facs.length;
  document.getElementById('dialog-fac-count').style.color = firstAreaColor;
  document.getElementById('dialog-courses').textContent = totalCourses;
  document.getElementById('dialog-courses').style.color = firstAreaColor;
  el.style.display = 'flex';
}
 
function draw() {
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.save();
  ctx.scale(DPR, DPR);
 
  const dark   = isDark();
  const active = selected || hovering;
  const { areas: hlA, facs: hlF } = getHL(active);
  const has = !!active;
 
  const lineBase = dark ? 'rgba(160,158,150,0.22)' : 'rgba(80,80,70,0.16)';
  const lineDim  = dark ? 'rgba(160,158,150,0.04)' : 'rgba(80,80,70,0.04)';
 
  FACULTY.forEach(f => {
    f.areas.forEach(id => {
      const a   = areaMap[id];
      const hl  = has && hlF.has(f.id) && hlA.has(id);
      const dim = has && !hl;
      ctx.beginPath();
      ctx.moveTo(f.x, f.y);
      ctx.lineTo(a.x, a.y);
      ctx.strokeStyle = dim ? lineDim : hl ? a.color : lineBase;
      ctx.lineWidth   = hl ? 2.5 : 0.8;
      ctx.stroke();
    });
  });
 
  AREAS.forEach(a => {
    const dim = has && !hlA.has(a.id);
    ctx.globalAlpha = dim ? 0.18 : 1;
    ctx.beginPath();
    ctx.rect(a.x - AW / 2, a.y - AH / 2, AW, AH);
    ctx.fillStyle   = areaFill(a);
    ctx.fill();
    ctx.strokeStyle = a.color;
    ctx.lineWidth   = 1.5;
    ctx.stroke();
 
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.fillStyle     = areaTextColor(a);
    const fs2 = Math.max(9, W * 0.017);
    ctx.font = `600 ${fs2}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
    const pipeIdx = a.label.indexOf('|');
    if (pipeIdx !== -1) {
      const line1 = a.label.slice(0, pipeIdx);
      const line2 = a.label.slice(pipeIdx + 1);
      ctx.fillText(line1, a.x, a.y - fs2 * 0.65);
      ctx.fillText(line2, a.x, a.y + fs2 * 0.65);
    } else {
      const spaceIdx = a.label.indexOf(' ');
      if (spaceIdx !== -1) {
        ctx.fillText(a.label.slice(0, spaceIdx), a.x, a.y - fs2 * 0.65);
        ctx.fillText(a.label.slice(spaceIdx + 1), a.x, a.y + fs2 * 0.65);
      } else {
        ctx.fillText(a.label, a.x, a.y);
      }
    }
    ctx.globalAlpha = 1;
  });
 
  FACULTY.forEach(f => {
    const hl  = has && hlF.has(f.id);
    const dim = has && !hl;
    ctx.globalAlpha = dim ? 0.15 : 1;
    ctx.beginPath();
    ctx.arc(f.x, f.y, FAC_R, 0, Math.PI * 2);
    ctx.fillStyle   = rankFill(f.rank);
    ctx.fill();
    ctx.strokeStyle = rankColor(f.rank);
    ctx.lineWidth   = hl ? 2.5 : 0.8;
    if (f.retiring) ctx.setLineDash([3, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
 
    const fs = Math.max(9, W * 0.019);
    ctx.font         = `500 ${fs}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = rankColor(f.rank);
    ctx.fillText(f.name, f.x, f.y);
    ctx.globalAlpha  = 1;
  });
 
  ctx.restore();
}
 
function hitTest(ex, ey) {
  for (const f of FACULTY) {
    const d = Math.sqrt((ex - f.x) ** 2 + (ey - f.y) ** 2);
    if (d < FAC_R + 4) return { type: 'fac', id: f.id, node: f };
  }
  for (const a of AREAS) {
    if (Math.abs(ex - a.x) < AW / 2 + 4 && Math.abs(ey - a.y) < AH / 2 + 4)
      return { type: 'area', id: a.id, node: a };
  }
  return null;
}
 
const info = document.getElementById('info');
 
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  hovering = hitTest(e.clientX - r.left, e.clientY - r.top);
  cv.style.cursor = hovering ? 'pointer' : 'default';
  if (!selected) draw();
});
 
cv.addEventListener('mouseleave', () => {
  hovering = null;
  if (!selected) draw();
});
 
cv.addEventListener('click', e => {
  const r = cv.getBoundingClientRect();
  const h = hitTest(e.clientX - r.left, e.clientY - r.top);
  if (!h) {
    selected = null;
    selectedRoom = null;
    info.textContent = 'Click a name or area to highlight connections';
    closeDialog();
    renderRooms();
    draw();
    return;
  }
  if (selected && selected.id === h.id) {
    selected = null;
    selectedRoom = null;
    info.textContent = 'Click a name or area to highlight connections';
    closeDialog();
  } else {
    selected = h;
    selectedRoom = null;
    if (h.type === 'fac') {
      closeDialog();
      const areaNames = h.node.areas.map(id => areaMap[id].label.replace('|','/')).join(', ');
      const rank = h.node.rank === 'tenure' ? 'Tenure-line' : 'Teaching track';
      info.innerHTML = `<strong>${h.node.name}</strong> — ${rank} &nbsp;·&nbsp; ${areaNames}`;
    } else {
      info.textContent = '';
      showDialog(h.node);
    }
  }
  renderRooms();
  draw();
});
 
function showDialog(area) {
  const facs = FACULTY.filter(f => f.areas.includes(area.id));
  const data = AREA_DATA[area.id];
  const el = document.getElementById('area-dialog');
  el.style.borderColor = area.color;
  document.getElementById('dialog-fac-count').textContent = facs.length;
  document.getElementById('dialog-fac-count').style.color = area.color;
  document.getElementById('dialog-courses').textContent = data.courses !== null ? data.courses : '0';
  document.getElementById('dialog-courses').style.color = area.color;
  el.style.display = 'flex';
}
 
function closeDialog() {
  document.getElementById('area-dialog').style.display = 'none';
}
 
function toggleRetiring() {
  showRetiring = !showRetiring;
  FACULTY = showRetiring ? ALL_FACULTY : ALL_FACULTY.filter(f => !f.retiring);
  selected = null;
  selectedRoom = null;
  info.textContent = 'Click a name or area to highlight connections';
  closeDialog();
  document.getElementById('retire-btn').textContent = showRetiring ? 'Hide retiring faculty' : 'Show retiring faculty';
  layout();
  renderRooms();
  draw();
}
 
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => draw());
window.addEventListener('resize', () => { layout(); draw(); });
 
layout();
renderRooms();
draw();
</script>
</body>
</html>
